syntax = "proto3";

package secretsanta.v1;

service SessionService {
  // Generate pairs without saving to DB
  rpc GeneratePairs(GeneratePairsRequest) returns (GeneratePairsResponse);
  // Save a session to the DB
  rpc SaveSession(SaveSessionRequest) returns (SaveSessionResponse);
  // List all sessions ordered by created_at descending
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  // Get the most recent session (to pre-fill participant names)
  rpc GetLatestSession(GetLatestSessionRequest) returns (GetLatestSessionResponse);
}

// Session entity
message Session {
  string name = 1;
  // ISO-8601 UTC timestamp string
  string created_at = 2;
  // JSON-encoded array: [{"giver":"Alice","receiver":"Bob"}, ...]
  string pairs = 3;
  repeated string participants = 4;
}

message GeneratePairsRequest {
  repeated string participants = 1;
}

message GeneratePairsResponse {
  // Unsaved session with generated pairs (no name, no created_at yet)
  string pairs = 1;
  repeated string participants = 2;
}

message SaveSessionRequest {
  string name = 1;
  repeated string participants = 2;
  string pairs = 3;
}

message SaveSessionResponse {
  Session session = 1;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message GetLatestSessionRequest {}

message GetLatestSessionResponse {
  Session session = 1;
  bool found = 2;
}
